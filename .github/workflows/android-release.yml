name: Android Release

# The drill · go Android app lives in android/. Push a tag like `android-v0.1.0`
# → this builds a signed release APK and attaches it to a GitHub Release.
# (Web/backend deploy separately via rsync and create no tags, so they never
# trigger this workflow.)
on:
  push:
    tags:
      - 'android-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'App version to build (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve version
        id: ver
        env:
          # Untrusted dispatch input via env (never inlined) + validated.
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          RAW="${GITHUB_REF_NAME:-$INPUT_TAG}"
          VER="${RAW#android-}"
          if ! printf '%s' "$VER" | grep -Eq '^v[0-9A-Za-z._+-]+$'; then
            echo "Invalid version: '$VER' (expected like v0.1.0)" >&2
            exit 1
          fi
          case "$RAW" in android-*) TAG="$RAW";; *) TAG="android-$VER";; esac
          echo "ver=$VER" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Decode keystore
        working-directory: android
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > release.jks

      - name: Build signed release APK
        working-directory: android
        env:
          KEYSTORE_FILE: release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Stage APK
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk \
             "drill-go-${{ steps.ver.outputs.ver }}.apk"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: drill · go ${{ steps.ver.outputs.ver }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: drill-go-${{ steps.ver.outputs.ver }}.apk

      - name: Clean up keystore
        if: always()
        run: rm -f android/release.jks
