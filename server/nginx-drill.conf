# /etc/nginx/sites-available/drill.celox.io  (symlink into sites-enabled)
# Static React build + /api proxy to the loopback Node service on :4252.
# TLS is added by certbot:  certbot --nginx -d drill.celox.io

server {
    listen 80;
    listen [::]:80;
    server_name drill.celox.io;

    root /var/www/drill.celox.io;
    index index.html;

    # API -> Node backend
    location /api/ {
        proxy_pass http://127.0.0.1:4252;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;   # SMTP latency on confirm-mail send
    }

    # Cache hashed assets aggressively; never cache the SPA shell.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location = /sw.js { add_header Cache-Control "no-cache"; }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
